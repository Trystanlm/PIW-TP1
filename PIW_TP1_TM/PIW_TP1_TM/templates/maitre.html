{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinéma - {% block title %}Accueil{% endblock %}</title>
    
    <!-- Lien CDN Boostrap 5.3 & CSS Static -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <!-- Header -->
    <header class="header-cinema border-bottom">
        <div class="py-3 px-3">
            <h1 class="text-white mb-0 h3">Cinéma le Scénario</h1>
        </div>
    </header>

    <!-- Navigation -->
    {% include "menu.html" %}

    <!-- Contenu principal de chaque page -->
    {% block contenu %} 

    {% endblock %}

    <!-- Footer -->
    <footer class="bg-light border-top mt-4">
        <div class="py-2 px-3 d-flex gap-3 flex-wrap">
            <p class="mb-0">625 1re Rue Poiré, La Pocatière, QC G0R 1Z0</p>
            <p class="mb-0">{% now "j F Y" %}</p> <!-- Affiche la date du jour formatée -->
            <p class="mb-0">marie@cinemalescenario.com</p>
            <p class="mb-0">Mathias et Trystan</p>
        </div>
    </footer>

</body>
</html>
