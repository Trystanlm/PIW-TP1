{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinéma - {% block title %}Accueil{% endblock %}</title>
    
    <!-- Lien CDN Boostrap 5.3 & CSS Static -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <!-- Header + Navigation fusionnés -->
    <header class="header-cinema">
        <nav class="navbar navbar-expand-lg navbar-dark px-3 py-2" style="background-color: #000000;">
            <a class="navbar-brand fw-bold" style="color: #FFD700;" href="/">Cinéma le Scénario</a>
            {% include "menu.html" %}
        </nav>
    </header>

    <!-- Contenu principal de chaque page -->
    <div id="contenu-principal">
        {% block contenu %} 

        {% endblock %}
    </div>

    <!-- Footer -->
    <footer class="mt-4" style="background-color: #000000;">
        <div class="py-2 px-3 d-flex gap-3 flex-wrap justify-content-center">
            <p class="mb-0 text-white">625 1re Rue Poiré, La Pocatière, QC G0R 1Z0</p>
            <p class="mb-0 text-white">Contact : marie@cinemalescenario.com</p>
            <p class="mb-0 text-white">Responsables : Mathias et Trystan</p>
            <p class="mb-0 text-white">{% now "j F Y" %}</p> <!-- Affiche la date du jour formatée -->
        </div>
    </footer>

</body>
</html>
